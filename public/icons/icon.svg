<!--
  App icon / favicon (TASK-F0TYG follow-up: "nulliel-app-icon") — replaces the
  old purple-swoosh mark with the Nulliel pixel-angel glyph. Same 13x13 pixel
  grid, 1.5-cell padding, dark-indigo (#1b112c) rounded-square backdrop, and
  palette as public/icons/nulliel.svg (kept as a separate file since it's also
  the source for the full-color notification image at nulliel-512.png — this
  file is the one every other favicon/app-icon asset in this directory is
  rendered from instead).

  Verified legible at both 32px and 16px (favicon tab-size): rendered with
  rsvg-convert at each size and read back pixel-for-pixel (nearest-neighbor
  upscale, no smoothing) — the ring's notch (torn seam), the debris fleck, and
  the red eye all stay distinguishable, so no further simplification
  (thicker ring / dropped debris pixel) was needed.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 16 16"
  width="512"
  height="512"
  shape-rendering="crispEdges"
>
  <rect width="16" height="16" rx="3.2" fill="#1b112c" />
  <g transform="translate(1.5,1.5)">
    <!-- ring, arc 1: top vertex down through the left flank — white @ 0.85 -->
    <g fill="#ffffff" fill-opacity="0.85">
      <rect x="6" y="0" width="1" height="1" />
      <rect x="5" y="1" width="1" height="1" />
      <rect x="6" y="1" width="1" height="1" />
      <rect x="7" y="1" width="1" height="1" />
      <rect x="4" y="2" width="1" height="1" />
      <rect x="5" y="2" width="1" height="1" />
      <rect x="7" y="2" width="1" height="1" />
      <rect x="3" y="3" width="1" height="1" />
      <rect x="4" y="3" width="1" height="1" />
      <rect x="2" y="4" width="1" height="1" />
      <rect x="3" y="4" width="1" height="1" />
      <rect x="1" y="5" width="1" height="1" />
      <rect x="2" y="5" width="1" height="1" />
      <rect x="0" y="6" width="1" height="1" />
      <rect x="1" y="6" width="1" height="1" />
      <rect x="1" y="7" width="1" height="1" />
      <rect x="2" y="7" width="1" height="1" />
      <rect x="2" y="8" width="1" height="1" />
      <rect x="3" y="8" width="1" height="1" />
      <rect x="3" y="9" width="1" height="1" />
    </g>

    <!-- ring, arc 2: bottom vertex up through the right flank — white @ 0.65 -->
    <g fill="#ffffff" fill-opacity="0.65">
      <rect x="6" y="12" width="1" height="1" />
      <rect x="5" y="11" width="1" height="1" />
      <rect x="6" y="11" width="1" height="1" />
      <rect x="7" y="11" width="1" height="1" />
      <rect x="4" y="10" width="1" height="1" />
      <rect x="5" y="10" width="1" height="1" />
      <rect x="7" y="10" width="1" height="1" />
      <rect x="4" y="9" width="1" height="1" />
      <rect x="8" y="9" width="1" height="1" />
      <rect x="8" y="10" width="1" height="1" />
      <rect x="9" y="8" width="1" height="1" />
      <rect x="9" y="9" width="1" height="1" />
      <rect x="10" y="7" width="1" height="1" />
      <rect x="10" y="8" width="1" height="1" />
      <rect x="11" y="5" width="1" height="1" />
      <rect x="11" y="6" width="1" height="1" />
      <rect x="11" y="7" width="1" height="1" />
      <rect x="12" y="6" width="1" height="1" />
      <rect x="9" y="4" width="1" height="1" />
      <rect x="10" y="4" width="1" height="1" />
      <rect x="10" y="5" width="1" height="1" />
    </g>

    <!-- the torn seam — white @ 0.35 -->
    <g fill="#ffffff" fill-opacity="0.35">
      <rect x="7" y="3" width="1" height="1" />
      <rect x="7" y="4" width="1" height="1" />
    </g>

    <!-- the loose fleck — white @ 0.3 -->
    <rect x="5" y="9" width="1" height="1" fill="#ffffff" fill-opacity="0.3" />

    <!-- off-center core, with a dim echo pixel riding beside it -->
    <rect x="8" y="7" width="1" height="1" fill="#eb4763" />
    <rect x="9" y="7" width="1" height="1" fill="#eb4763" fill-opacity="0.4" />
  </g>
</svg>
