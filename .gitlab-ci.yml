# GitLab CI for slipstream — gates every merge request on the same quality
# checks `pnpm deploy` runs on a dev machine (svelte-check, vitest, build).
#
# NOTE: CI deliberately never honors the SKIP_CHECKS / --skip-checks escape
# hatch. That flag only short-circuits scripts/deploy.sh for local dev; here we
# invoke `pnpm check` / `pnpm test` / `pnpm build` directly, so MRs are always
# gated regardless of any local convenience flags.
image: node:22

# Run exactly one pipeline per change: on merge requests, and on the default
# branch after merge. Without this, GitLab would create duplicate branch- and
# MR-pipelines for every push from an open MR.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - verify
  - publish

variables:
  # Keep the pnpm content-addressable store inside the project dir so GitLab can
  # cache it between pipelines (default store lives in $HOME, which is not
  # cacheable).
  PNPM_STORE_DIR: '$CI_PROJECT_DIR/.pnpm-store'

# Cache the pnpm store keyed on the lockfile so unchanged deps are restored
# instead of re-downloaded.
cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store

before_script:
  - corepack enable
  - pnpm config set store-dir "$PNPM_STORE_DIR"
  - pnpm install --frozen-lockfile

# Shared job scaffold: every verify job cancels if superseded by a newer push.
.verify:
  stage: verify
  interruptible: true

lint:
  extends: .verify
  script:
    - pnpm lint

check:
  extends: .verify
  script:
    - pnpm check

test:
  extends: .verify
  script:
    - pnpm test

# Coverage visibility — kept separate from `test` so the gating job stays fast.
# Publishes a browsable HTML report plus a Cobertura report GitLab renders as
# inline diff annotations, and sets the MR coverage badge via the `coverage:`
# regex below (matches vitest's v8 text reporter "All files" summary row).
coverage:
  extends: .verify
  script:
    - pnpm test:coverage
  coverage: '/All files[^|]*\|\s*([\d.]+)/'
  artifacts:
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

build:
  extends: .verify
  script:
    - pnpm build
    - node scripts/check-preload-cjs.mjs

# CI smoke driver (scripts/e2e/smoke-add-repo.mjs): launches the built desktop
# app under xvfb and exercises the Add-repo flow end to end, including the
# window.slipstream preload-bridge check. Too slow/flaky-prone for every MR,
# so it only runs on scheduled pipelines (set one up in GitLab: Build > Pipeline
# schedules) and is otherwise available `when: manual` so it never blocks a
# merge. Uses the Playwright image for its bundled browser system libs, and
# overrides before_script (like publish-image) since it needs its own install
# + native-rebuild + build sequence instead of the default `pnpm install`.
e2e-smoke:
  stage: verify
  image: mcr.microsoft.com/playwright:v1.60.0-jammy
  interruptible: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  before_script: []
  script:
    - apt-get update && apt-get install -y xvfb || true
    - corepack enable
    - pnpm config set store-dir "$PNPM_STORE_DIR"
    - pnpm install --frozen-lockfile
    - pnpm dlx @electron/rebuild --force --only better-sqlite3,node-pty
    - pnpm build
    - xvfb-run -a node scripts/e2e/smoke-add-repo.mjs

# Headless restart/crash-recovery e2e (FLO-135): the only CI path that
# exercises reconnect/replay/restart. Drives the daemon in web mode with
# Playwright chromium (no Electron, no xvfb): stub `claude` → SIGKILL daemon
# → restart against the same data dir → assert the orphaned session is marked
# `interrupted` (restoreInterruptedSessions on boot) and its scrollback replays
# (sessionManager.getBuffer's not-live fallback). Scheduled + manual like
# e2e-smoke so it never blocks a merge; shares the Playwright image (chromium
# + system libs are preinstalled there). See scripts/e2e/restart-recovery-flow.mjs.
e2e-restart:
  stage: verify
  image: mcr.microsoft.com/playwright:v1.60.0-jammy
  interruptible: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  before_script: []
  script:
    - corepack enable
    - pnpm config set store-dir "$PNPM_STORE_DIR"
    - pnpm install --frozen-lockfile
    - pnpm dlx @electron/rebuild --force --only better-sqlite3,node-pty
    - pnpm build
    - node scripts/e2e/restart-recovery-flow.mjs

# Publish the production server image to the GitLab Container Registry on every
# merge to the default branch, as an alternative deploy path to the systemd/
# launchd flow (pnpm deploy) and the Tailscale-sidecar pod (docker-compose.yml).
publish-image:
  stage: publish
  image: docker:cli
  services:
    - docker:dind
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script: []
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:latest" -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
