# One-command Slipstream pod: the daemon + a Tailscale sidecar that publishes it
# over HTTPS on your tailnet. See docs/POD-DEPLOY.md for the full walkthrough.
#
#   cp .env.pod.example .env && $EDITOR .env   # fill in the secrets
#   docker compose up -d --build
#
services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TS_HOSTNAME:-slipstream}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?set TS_AUTHKEY in .env}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./deploy/pod/tailscale-serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  slipstream:
    build: .
    image: slipstream:latest
    # Share the Tailscale container's network so `tailscale serve` reaches the
    # daemon on 127.0.0.1 and nothing is exposed outside the tailnet.
    network_mode: service:tailscale
    depends_on:
      - tailscale
    environment:
      SLIPSTREAM_TOKEN: ${SLIPSTREAM_TOKEN:?set SLIPSTREAM_TOKEN in .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in .env}
      SLIPSTREAM_BIND: 127.0.0.1
      SLIPSTREAM_PORT: 7421
      GIT_USER_NAME: ${GIT_USER_NAME:-}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-}
      GH_TOKEN: ${GH_TOKEN:-}
    volumes:
      - slipstream-data:/home/slipstream
    restart: unless-stopped

volumes:
  tailscale-state:
  slipstream-data:
